name: Update latest Royal Road chapter

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Royal Road latest chapter
        run: npm run update:latest

      - name: Commit updated latest chapter data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update latest Royal Road chapter
          file_pattern: latest-chapter.json
